<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 36px 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
        h2 { font-size: 1.3rem; font-weight: 800; color: #1e293b; margin-bottom: 6px; }
        .sub { font-size: 0.85rem; color: #64748b; margin-bottom: 24px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: #64748b; margin-bottom: 6px; margin-top: 16px; }
        input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            background: #f8fafc;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #2563eb; background: white; }
        .hint { font-size: 0.75rem; color: #94a3b8; margin-top: 5px; }
        button.main-btn {
            width: 100%;
            padding: 14px;
            margin-top: 24px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(37,99,235,0.35);
        }
        .msg { text-align: center; margin-top: 12px; font-size: 13px; min-height: 20px; }
        .error { color: #ef4444; }
        .success { color: #16a34a; }
        .back { text-align: center; margin-top: 20px; }
        .back a { color: #64748b; font-size: 13px; text-decoration: none; }
        .back a:hover { color: #2563eb; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔒 비밀번호 변경</h2>
        <p class="sub">현재 비밀번호 확인 후 새 비밀번호로 변경합니다</p>

        <label>현재 비밀번호</label>
        <input type="password" id="currentPw" placeholder="현재 비밀번호" />

        <label>새 비밀번호</label>
        <input type="password" id="newPw" placeholder="영문+숫자 8자 이상" />
        <p class="hint">영문 + 숫자 포함 8자 이상</p>

        <label>새 비밀번호 확인</label>
        <input type="password" id="confirmPw" placeholder="새 비밀번호 재입력" />

        <button class="main-btn" onclick="changePw()">변경하기</button>
        <div class="msg" id="msg"></div>

        <div class="back">
            <a href="./index.html">← 메인으로 돌아가기</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hamwwywmxgrtcflqjhiu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Y0xw-puAOpBXVZ8g-I6JfA_4dz8rESU';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_KEY);

        // 로그인 확인
        const user = JSON.parse(sessionStorage.getItem('user') || 'null');
        if (!user || Date.now() > user.expires) {
            window.location.href = './login.html';
        }

        function md5(str) { return CryptoJS.MD5(str).toString(); }

        function showMsg(text, isError = false) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg ' + (isError ? 'error' : 'success');
        }

        async function changePw() {
            const currentPw = document.getElementById('currentPw').value;
            const newPw = document.getElementById('newPw').value;
            const confirmPw = document.getElementById('confirmPw').value;

            if (!currentPw || !newPw || !confirmPw) return showMsg('모든 항목을 입력해주세요.', true);
            if (newPw !== confirmPw) return showMsg('새 비밀번호가 일치하지 않습니다.', true);
            if (newPw.length < 8 || !/[a-zA-Z]/.test(newPw) || !/[0-9]/.test(newPw)) {
                return showMsg('영문+숫자 포함 8자 이상으로 설정해주세요.', true);
            }
            if (currentPw === newPw) return showMsg('현재 비밀번호와 다른 비밀번호를 입력하세요.', true);

            // 현재 비밀번호 확인
            const { data: check } = await db
                .from('employees')
                .select('emp_id')
                .eq('emp_id', user.emp_id)
                .eq('password', md5(currentPw))
                .single();

            if (!check) return showMsg('현재 비밀번호가 틀렸습니다.', true);

            const { error } = await db
                .from('employees')
                .update({ password: md5(newPw) })
                .eq('emp_id', user.emp_id);

            if (error) return showMsg('오류가 발생했습니다. 다시 시도해주세요.', true);

            showMsg('✅ 비밀번호가 변경되었습니다! 재로그인 해주세요.');
            setTimeout(() => {
                sessionStorage.removeItem('user');
                window.location.href = './login.html';
            }, 2500);
        }
    </script>
</body>
</html>
