<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강남 5G 통합 지원 시스템 - 로그인</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        .logo-area .icon { font-size: 3rem; margin-bottom: 10px; }
        .logo-area h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
        .logo-area p { font-size: 0.85rem; opacity: 0.7; margin-top: 6px; }

        .card {
            background: white;
            border-radius: 24px;
            padding: 36px 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 24px;
            text-align: center;
        }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 6px;
            margin-top: 16px;
        }
        input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            background: #f8fafc;
            color: #1e293b;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus { border-color: #2563eb; background: white; }
        button.login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 24px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(37,99,235,0.35);
            transition: transform 0.1s;
        }
        button.login-btn:active { transform: scale(0.98); }
        .msg {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            min-height: 20px;
            color: #ef4444;
        }
        .find-pw {
            text-align: center;
            margin-top: 20px;
        }
        .find-pw a {
            color: #2563eb;
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
        }
        .find-pw a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="logo-area">
        <div class="icon">📡</div>
        <h1>강남 5G 통합 지원 시스템</h1>
        <p>승인된 사용자만 접속 가능합니다</p>
    </div>

    <div class="card">
        <h2>🔐 시스템 로그인</h2>

        <label>사번</label>
        <input type="text" id="empId" placeholder="사번을 입력하세요" autocomplete="username" />

        <label>비밀번호</label>
        <input type="password" id="pw" placeholder="비밀번호를 입력하세요" autocomplete="current-password" />

        <button class="login-btn" onclick="login()">로그인</button>
        <div class="msg" id="msg"></div>

        <div class="find-pw">
            <a href="./find-password.html">비밀번호를 잊으셨나요?</a>
        </div>
    </div>

    <script>
        // ✅ Supabase 설정
        const SUPABASE_URL = 'https://hamwwywmxgrtcflqjhiu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Y0xw-puAOpBXVZ8g-I6JfA_4dz8rESU';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_KEY);

        // 이미 로그인 상태면 바로 메인으로
        const existing = JSON.parse(sessionStorage.getItem('user') || 'null');
        if (existing && Date.now() < existing.expires) {
            window.location.href = './index.html';
        }

        function md5(str) { return CryptoJS.MD5(str).toString(); }

        function showMsg(text) {
            document.getElementById('msg').textContent = text;
        }

        async function login() {
            const empId = document.getElementById('empId').value.trim();
            const pw = document.getElementById('pw').value;

            if (!empId || !pw) {
                showMsg('사번과 비밀번호를 입력하세요.');
                return;
            }

            showMsg('확인 중...');

            const { data, error } = await db
                .from('employees')
                .select('emp_id, name, is_first_login, is_active')
                .eq('emp_id', empId)
                .eq('password', md5(pw))
                .single();

            if (!data || !data.is_active) {
                showMsg('사번 또는 비밀번호가 틀렸습니다.');
                return;
            }

            // 세션 저장 (8시간)
            sessionStorage.setItem('user', JSON.stringify({
                emp_id: data.emp_id,
                name: data.name,
                expires: Date.now() + 8 * 60 * 60 * 1000
            }));

            // 최초 로그인이면 이메일 등록 페이지로
            if (data.is_first_login) {
                window.location.href = './register-email.html';
            } else {
                window.location.href = './index.html';
            }
        }

        // Enter 키 지원
        document.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
