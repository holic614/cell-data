<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 36px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }

        /* Step 표시 */
        .steps {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 28px;
        }
        .step-dot {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #e2e8f0;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .step-dot.active { background: #2563eb; color: white; }
        .step-dot.done { background: #16a34a; color: white; }
        .step-line { width: 30px; height: 2px; background: #e2e8f0; }
        .step-line.done { background: #16a34a; }

        h2 { font-size: 1.3rem; font-weight: 800; color: #1e293b; margin-bottom: 6px; }
        .sub { font-size: 0.85rem; color: #64748b; margin-bottom: 24px; line-height: 1.5; }

        .step-section { display: none; }
        .step-section.active { display: block; }

        label { display: block; font-size: 0.8rem; font-weight: 700; color: #64748b; margin-bottom: 6px; margin-top: 16px; }
        input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            background: #f8fafc;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #2563eb; background: white; }
        input#code { font-size: 20px; letter-spacing: 6px; text-align: center; font-weight: 700; }

        button.main-btn {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(37,99,235,0.35);
        }
        button.sec-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: white;
            color: #2563eb;
            border: 1.5px solid #2563eb;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .timer-box {
            text-align: center;
            margin: 16px 0 8px;
            font-size: 1.4rem;
            font-weight: 800;
            color: #f59e0b;
        }
        .timer-box.expired { color: #ef4444; }

        .hint { font-size: 0.75rem; color: #94a3b8; margin-top: 5px; }
        .msg { text-align: center; margin-top: 12px; font-size: 13px; min-height: 18px; }
        .error { color: #ef4444; }
        .success { color: #16a34a; }

        .back { text-align: center; margin-top: 20px; }
        .back a { color: #64748b; font-size: 13px; text-decoration: none; }
        .back a:hover { color: #2563eb; }
    </style>
</head>
<body>
    <div class="card">
        <!-- Step 표시기 -->
        <div class="steps">
            <div class="step-dot active" id="dot1">1</div>
            <div class="step-line" id="line1"></div>
            <div class="step-dot" id="dot2">2</div>
            <div class="step-line" id="line2"></div>
            <div class="step-dot" id="dot3">3</div>
        </div>

        <!-- Step 1: 사번 + 이메일 입력 -->
        <div class="step-section active" id="step1">
            <h2>🔑 비밀번호 찾기</h2>
            <p class="sub">등록된 사번과 SK 사내 이메일을 입력하면<br>인증코드를 발송해드립니다.</p>

            <label>사번</label>
            <input type="text" id="empId" placeholder="사번을 입력하세요" />

            <label>등록 이메일</label>
            <input type="email" id="email" placeholder="example@sk.com" />

            <button class="main-btn" onclick="sendCode()">인증코드 발송</button>
            <div class="msg" id="msg1"></div>

            <div class="back"><a href="./login.html">← 로그인으로</a></div>
        </div>

        <!-- Step 2: 인증코드 확인 -->
        <div class="step-section" id="step2">
            <h2>📩 인증코드 확인</h2>
            <p class="sub">이메일로 발송된 <strong>6자리 인증코드</strong>를 입력해주세요.<br>유효시간은 10분입니다.</p>

            <div class="timer-box" id="timer">10:00</div>

            <label>인증코드</label>
            <input type="text" id="code" placeholder="000000" maxlength="6" inputmode="numeric" />

            <button class="main-btn" onclick="verifyCode()">인증 확인</button>
            <button class="sec-btn" onclick="resendCode()">📧 인증코드 재발송</button>
            <div class="msg" id="msg2"></div>
        </div>

        <!-- Step 3: 새 비밀번호 설정 -->
        <div class="step-section" id="step3">
            <h2>🔐 새 비밀번호 설정</h2>
            <p class="sub">새로운 비밀번호를 설정해주세요.</p>

            <label>새 비밀번호</label>
            <input type="password" id="newPw" placeholder="영문+숫자 8자 이상" />
            <p class="hint">영문 + 숫자 포함 8자 이상</p>

            <label>새 비밀번호 확인</label>
            <input type="password" id="confirmPw" placeholder="비밀번호 재입력" />

            <button class="main-btn" onclick="resetPw()">비밀번호 재설정</button>
            <div class="msg" id="msg3"></div>
        </div>
    </div>

    <script>
        // ✅ 설정값 (본인 값으로 교체)
        const SUPABASE_URL = 'https://hamwwywmxgrtcflqjhiu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Y0xw-puAOpBXVZ8g-I6JfA_4dz8rESU';
        const EMAILJS_PUBLIC_KEY = '여기에_EmailJS_Public_Key';
        const EMAILJS_SERVICE_ID = '여기에_Service_ID';
        const EMAILJS_TEMPLATE_ID = '여기에_Template_ID';

        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_KEY);
        emailjs.init(EMAILJS_PUBLIC_KEY);

        let timerInterval = null;
        let currentEmpId = null;
        let currentEmail = null;

        function md5(str) { return CryptoJS.MD5(str).toString(); }

        function showMsg(step, text, isError = false) {
            const el = document.getElementById('msg' + step);
            el.textContent = text;
            el.className = 'msg ' + (isError ? 'error' : 'success');
        }

        function goStep(n) {
            document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');

            // Step 표시기 업데이트
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById('dot' + i);
                if (i < n) { dot.className = 'step-dot done'; dot.textContent = '✓'; }
                else if (i === n) { dot.className = 'step-dot active'; dot.textContent = i; }
                else { dot.className = 'step-dot'; dot.textContent = i; }
            }
            for (let i = 1; i <= 2; i++) {
                const line = document.getElementById('line' + i);
                line.className = i < n ? 'step-line done' : 'step-line';
            }
        }

        function startTimer() {
            let seconds = 600;
            clearInterval(timerInterval);
            const el = document.getElementById('timer');
            el.className = 'timer-box';
            timerInterval = setInterval(() => {
                seconds--;
                const m = String(Math.floor(seconds / 60)).padStart(2, '0');
                const s = String(seconds % 60).padStart(2, '0');
                el.textContent = `${m}:${s}`;
                if (seconds <= 60) el.style.color = '#ef4444';
                if (seconds <= 0) {
                    clearInterval(timerInterval);
                    el.textContent = '만료됨';
                    el.className = 'timer-box expired';
                    showMsg(2, '인증코드가 만료되었습니다. 재발송해주세요.', true);
                }
            }, 1000);
        }

        function generateCode() {
            return String(Math.floor(100000 + Math.random() * 900000));
        }

        async function sendCode() {
            const empId = document.getElementById('empId').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();

            if (!empId || !email) return showMsg(1, '사번과 이메일을 입력해주세요.', true);
            if (!email.endsWith('@sk.com')) return showMsg(1, '@sk.com 이메일만 사용 가능합니다.', true);

            showMsg(1, '확인 중...');

            const { data } = await db
                .from('employees')
                .select('emp_id, name, email, is_active')
                .eq('emp_id', empId)
                .eq('is_active', true)
                .maybeSingle();

            if (!data) return showMsg(1, '등록된 사번이 없습니다.', true);
            if (data.email !== email) return showMsg(1, '등록된 이메일과 일치하지 않습니다.', true);

            currentEmpId = empId;
            currentEmail = email;

            const code = generateCode();
            const expires = Date.now() + 10 * 60 * 1000;

            await db.from('employees').update({
                reset_code: code,
                reset_expires: expires
            }).eq('emp_id', empId);

            try {
                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                    to_email: email,
                    name: data.name,
                    emp_id: empId,
                    code: code
                });
                showMsg(1, '✅ 인증코드를 발송했습니다!');
                setTimeout(() => { goStep(2); startTimer(); }, 1000);
            } catch (e) {
                showMsg(1, '이메일 발송 실패. 잠시 후 다시 시도해주세요.', true);
            }
        }

        async function resendCode() {
            if (!currentEmpId) return;
            const code = generateCode();
            const expires = Date.now() + 10 * 60 * 1000;

            const { data } = await db.from('employees').select('name').eq('emp_id', currentEmpId).single();

            await db.from('employees').update({ reset_code: code, reset_expires: expires }).eq('emp_id', currentEmpId);

            try {
                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                    to_email: currentEmail, name: data.name, emp_id: currentEmpId, code: code
                });
                showMsg(2, '✅ 재발송 완료!');
                startTimer();
            } catch(e) {
                showMsg(2, '발송 실패. 다시 시도해주세요.', true);
            }
        }

        async function verifyCode() {
            const inputCode = document.getElementById('code').value.trim();
            if (!inputCode || inputCode.length !== 6) return showMsg(2, '6자리 코드를 입력해주세요.', true);

            const { data } = await db
                .from('employees')
                .select('reset_code, reset_expires')
                .eq('emp_id', currentEmpId)
                .single();

            if (!data?.reset_code) return showMsg(2, '인증코드를 먼저 발송해주세요.', true);
            if (Date.now() > data.reset_expires) return showMsg(2, '인증코드가 만료되었습니다. 재발송해주세요.', true);
            if (data.reset_code !== inputCode) return showMsg(2, '인증코드가 올바르지 않습니다.', true);

            clearInterval(timerInterval);
            showMsg(2, '✅ 인증 완료!');
            setTimeout(() => goStep(3), 800);
        }

        async function resetPw() {
            const newPw = document.getElementById('newPw').value;
            const confirmPw = document.getElementById('confirmPw').value;

            if (newPw !== confirmPw) return showMsg(3, '비밀번호가 일치하지 않습니다.', true);
            if (newPw.length < 8 || !/[a-zA-Z]/.test(newPw) || !/[0-9]/.test(newPw)) {
                return showMsg(3, '영문+숫자 포함 8자 이상으로 설정해주세요.', true);
            }

            const { error } = await db
                .from('employees')
                .update({ password: md5(newPw), reset_code: null, reset_expires: null })
                .eq('emp_id', currentEmpId);

            if (error) return showMsg(3, '오류가 발생했습니다.', true);

            showMsg(3, '✅ 비밀번호가 변경되었습니다! 로그인 페이지로 이동합니다.');
            setTimeout(() => window.location.href = './login.html', 2500);
        }
    </script>
</body>
</html>
